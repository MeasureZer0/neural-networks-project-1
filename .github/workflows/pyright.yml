name: Pyright

on: [push]

jobs:
    type-check:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: ["3.13"]

        steps:
            - uses: jakebailey/pyright-action@v3.0.2
              with:
                  version: 1.1.408
                  python-version: ${{ matrix.python-version }}
                  pylance-version: latest-release
                  working-directory: .
                  project: .
